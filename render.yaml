services:
  - type: web
    name: fypproject-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn config.wsgi
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fypproject_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: DEBUG
        value: false

databases:
  - name: fypproject_db
    databaseName: fypproject
    user: postgres
    plan: free
    region: ohio
